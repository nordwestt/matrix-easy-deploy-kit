services:
  hookshot-redis:
    image: redis:7-alpine
    container_name: matrix-hookshot-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - ./redis_data:/data
    networks:
      - caddy_net

  hookshot:
    image: halfshot/matrix-hookshot:latest
    container_name: matrix-hookshot
    restart: unless-stopped
    # No host-port bindings needed — all traffic flows through the shared
    # Docker networks (caddy_net for Caddy proxy + Synapse → Hookshot,
    # matrix_internal for Hookshot → Synapse).
    volumes:
      # Contains config.yml, registration.yml, and passkey.pem
      - ./hookshot:/data
    networks:
      - caddy_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/healthz || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    depends_on:
      - hookshot-redis

networks:
  caddy_net:
    external: true
    name: caddy_net
